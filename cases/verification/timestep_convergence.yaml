# Verification Case: Time-Step Convergence Test
case_name: verification_timestep_convergence
method_category: mcc_verification

beam:
  energy_keV: 30.0
  current_mA: 10.0
  particle_count: 1000

plasma:
  gas: H2
  pressure_torr: 1.0e-5
  temperature_k: 300.0
  cross_section_m2: 1.0e-20

numerics:
  base_dt_s: 1.0e-11
  dt_factors: [1.0, 0.5, 0.25]
  total_time_s: 1.0e-9
