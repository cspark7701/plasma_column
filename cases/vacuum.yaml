# Vacuum Reference Case Configuration
case_name: vacuum_reference
description: Baseline 30 keV proton beam propagation in vacuum without plasma cell or neutralizer gas.

# Beam parameters
beam:
  species: proton
  energy_keV: 30.0
  current_mA: 10.0
  radius_m: 0.002
  rms_divergence: 0.0

# Gas & plasma cell parameters
plasma:
  gas: none
  pressure_torr: 0.0
  column_zmin_m: 0.0
  column_length_m: 0.20
  plasma_radius_m: 0.003
  neutralization: 0.0
  steady_state_neutralization: 0.0
  electron_temperature_eV: 1.0

# External fields
solenoid:
  Bz_T: 0.15

# Numerical & diagnostic parameters
numerics:
  nx: 32
  ny: 32
  nz: 256
  xmax_m: 0.01
  ymax_m: 0.01
  zmin_m: -0.02
  zmax_m: 0.24
  max_steps: 2000
  cfl: 0.7
  nppc_beam: 4
  nppc_plasma: 4
  mcc: none
